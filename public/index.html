<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1C1C1E" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Я Депутат</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" href="/icons/icon-192.svg" sizes="192x192">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="/css/style.css?v=250">
</head>
<body>
  <script>
    (function(){
      var fs=localStorage.getItem('ya-deputat-font-size');
      if(fs)document.documentElement.style.fontSize=fs;
      try{if(/iPhone|iPad|iPod/.test(navigator.userAgent))document.documentElement.style.setProperty('--sat','54px');}catch(e){}
      // Theme
      var theme=localStorage.getItem('ya-deputat-theme')||'light';
      if(theme==='dark')document.documentElement.className='theme-dark';
      else if(theme==='auto')document.documentElement.className='theme-auto';
    })();
  </script>
  <div id="app"></div>
  <div class="brand-footer" id="brand-footer">
    <a href="https://zetit.ru" target="_blank" class="brand-link">
      <img src="/icons/zetit-logo.png" alt="ЗЕТИТ" class="brand-logo" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <div class="brand-name" style="display:none">ЗЕТИТ</div>
      <div class="brand-sub">Разработано в лаборатории креативных идей</div>
    </a>
    <div class="brand-version">v2.5.0</div>
  </div>

  <script src="/js/api.js?v=250"></script>
  <script src="/js/admin.js?v=250"></script>
  <script src="/js/deputy.js?v=250"></script>
  <script src="/js/app.js?v=250"></script>
  <script src="/js/offline.js?v=250"></script>
  <script src="/js/pull-refresh.js?v=250"></script>
</body>
</html>
